<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini GTA 3D - Mobile FIX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body { margin:0; overflow:hidden; background:black; touch-action:none; }

#shoot {
  position:absolute;
  bottom:40px;
  right:30px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:red;
  color:white;
  font-size:18px;
  border:none;
}

#joystick {
  position:absolute;
  bottom:40px;
  left:30px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
}

#stick {
  position:absolute;
  width:50px;
  height:50px;
  border-radius:50%;
  background:white;
  left:35px;
  top:35px;
}
</style>
</head>

<body>

<div id="joystick"><div id="stick"></div></div>
<button id="shoot">FIRE</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
/* SCENE */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

/* CAMERA */
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,5,10);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHTS (FIXED) */
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5,10,5);
scene.add(dirLight);

/* GROUND */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* PLAYER */
const player = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x0000ff})
);
player.position.y = 1;
scene.add(player);

/* NPC */
const npc = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
npc.position.set(8,1,0);
scene.add(npc);

/* JOYSTICK */
let moveX = 0, moveZ = 0;
const stick = document.getElementById("stick");
const joystick = document.getElementById("joystick");

joystick.addEventListener("touchmove", e => {
  const rect = joystick.getBoundingClientRect();
  const t = e.touches[0];
  const x = t.clientX - rect.left - 60;
  const y = t.clientY - rect.top - 60;

  moveX = x / 40;
  moveZ = y / 40;

  stick.style.left = (x + 60 - 25) + "px";
  stick.style.top = (y + 60 - 25) + "px";
});

joystick.addEventListener("touchend", () => {
  moveX = moveZ = 0;
  stick.style.left = "35px";
  stick.style.top = "35px";
});

/* SHOOT */
const raycaster = new THREE.Raycaster();
document.getElementById("shoot").onclick = () => {
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const hit = raycaster.intersectObject(npc);
  if(hit.length){
    npc.material.color.set(0x000000);
    npc.position.y = 0.5;
  }
};

/* GAME LOOP */
function animate(){
  requestAnimationFrame(animate);

  player.position.x += moveX * 0.05;
  player.position.z += moveZ * 0.05;

  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 10;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}
animate();

/* RESIZE */
window.onresize = () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
};
</script>

</body>
</html>
