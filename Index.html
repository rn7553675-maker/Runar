<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Zombie Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        #score { font-size: 30px; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">Score: 0</div>
        <p>Tap to Jump</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, zombie, mixer, clock;
        let score = 0;
        let isJumping = false;
        let velocity = 0;
        let obstacles = [];
        const gravity = -0.01;

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 7);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Light
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7.5);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Ground
            const planeGeo = new THREE.PlaneGeometry(100, 100);
            const planeMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.receiveShadow = true;
            scene.add(plane);

            // 3D Model Loading
            const loader = new GLTFLoader();
            loader.load('zombie_walk_test.glb', (gltf) => {
                zombie = gltf.scene;
                zombie.scale.set(1.5, 1.5, 1.5);
                zombie.castShadow = true;
                scene.add(zombie);

                // Animation
                mixer = new THREE.AnimationMixer(zombie);
                if(gltf.animations.length > 0) {
                    mixer.clipAction(gltf.animations[0]).play();
                }
            }, undefined, (error) => {
                console.error("Model load failed", error);
            });

            window.addEventListener('mousedown', jump);
            window.addEventListener('touchstart', jump);
            animate();
        }

        function jump() {
            if (!isJumping) {
                isJumping = true;
                velocity = 0.2;
            }
        }

        function createObstacle() {
            if (Math.random() < 0.02) {
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
                const box = new THREE.Mesh(geometry, material);
                box.position.set(0, 0.5, -20);
                scene.add(box);
                obstacles.push(box);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            if (zombie) {
                // Jump Physics
                if (isJumping) {
                    zombie.position.y += velocity;
                    velocity += gravity;
                    if (zombie.position.y <= 0) {
                        zombie.position.y = 0;
                        isJumping = false;
                    }
                }

                // Obstacles Logic
                createObstacle();
                for (let i = 0; i < obstacles.length; i++) {
                    obstacles[i].position.z += 0.2;

                    // Collision detection
                    if (obstacles[i].position.z > 0 && obstacles[i].position.z < 1) {
                        if (zombie.position.y < 1) {
                            alert("Game Over! Score: " + score);
                            location.reload();
                        }
                    }
                }
            }

            score++;
            document.getElementById('score').innerText = "Score: " + Math.floor(score / 10);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
